name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: backend-go/go.sum

      - name: Verify modules
        working-directory: backend-go
        run: |
          go mod download
          go mod verify

      - name: Vet
        working-directory: backend-go
        run: go vet ./...

      - name: Build
        working-directory: backend-go
        run: go build ./...

      - name: Test (race)
        working-directory: backend-go
        env:
          GOTOOLCHAIN: local
        run: go test ./internal/... -count=1 -race -timeout 120s

  frontend:
    name: Frontend (Vite + TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
