openapi: 3.1.0
info:
  title: Ripple API
  version: 0.3.0
  description: |
    青萍 (Ripple) 水文生态创意系统 · 后端 API 契约
    
    **契约原则**：
    - 本文件是 Python / Go 两个实现的**单一真相源**
    - 任何 API 变更必须先改此文件再改实现
    - 破坏性变更必须经接口设计师评审 + 版本路径升级 (/api/v2)
    
    **约束参考**：`docs/system-design/系统约束规约.md`
  contact:
    name: Ripple 团队
  license:
    name: TBD

servers:
  - url: http://localhost:8000/api/v1
    description: 本地开发
  - url: https://api.ripple.example.com/api/v1
    description: 生产（占位）

tags:
  - name: auth
    description: 认证（注册/登录/刷新）
  - name: lake
    description: 湖泊（容器）CRUD
  - name: node
    description: 节点（涟漪/浮萍）CRUD + 状态机  - name: tag
    description: 节点标签系统（P13-C）
  - name: search
    description: 全文搜索（P14-B）
  - name: export
    description: 内容导出（P13-D）
  - name: import
    description: 内容导入（P13-E）
  - name: notification
    description: 通知系统（P13-B / P14-A）  - name: cloud
    description: 云霓（迷雾草稿）与凝露
  - name: share
    description: 湖泊分享链接
  - name: iceberg
    description: 冰山（版本快照）· M2
  - name: meta
    description: 健康检查与元信息

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: 注册新用户
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '409':
          description: 邮箱已存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/login:
    post:
      tags: [auth]
      summary: 登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401':
          description: 凭证错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /lakes:
    get:
      tags: [lake]
      summary: 列出我加入的湖泊
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Lake' }
    post:
      tags: [lake]
      summary: 创建湖泊
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LakeCreate' }
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Lake' }

  /nodes:
    post:
      tags: [node]
      summary: 创建节点（投下一颗石子 → DROP）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NodeCreate' }
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Node' }

  /nodes/by-lake/{lake_id}:
    get:
      tags: [node]
      summary: 列出湖内节点（权限：≥ OBSERVER）
      parameters:
        - in: path
          name: lake_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Node' }

  /nodes/{node_id}:
    get:
      tags: [node]
      summary: 获取节点详情
      parameters:
        - in: path
          name: node_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Node' }
        '404':
          description: 不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /nodes/{node_id}/evaporate:
    post:
      tags: [node]
      summary: 蒸发（软删，→ VAPOR 30d TTL）
      description: |
        权限：节点创建者 OR 湖泊 OWNER。
        状态前置：DROP 或 FROZEN。
      parameters:
        - in: path
          name: node_id
          required: true
          schema: { type: string }
      responses:
        '204':
          description: 已蒸发
        '403':
          description: 无权
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /nodes/{node_id}/restore:
    post:
      tags: [node]
      summary: 凝露还原（VAPOR → DROP）
      parameters:
        - in: path
          name: node_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 已还原
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Node' }

  /nodes/mist-zone/mine:
    get:
      tags: [node]
      summary: 我的迷雾区（VAPOR 未过期节点）
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Node' }

  /cloud/mist:
    post:
      tags: [cloud]
      summary: 提交一条迷雾草稿（MIST 7d TTL）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MistCreate' }
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Mist' }

  /cloud/condense:
    post:
      tags: [cloud]
      summary: 凝露：批量把 MIST 节点迁入目标湖（MIST → DROP）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CondenseRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CondenseResponse' }

  /health:
    get:
      tags: [meta]
      summary: 健康检查
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: ripple-backend }
                  version: { type: string }

  # ==== P13-C 标签系统 ====

  /lakes/{lake_id}/tags:
    get:
      tags: [tag]
      summary: 列出湖内所有标签
      parameters:
        - in: path
          name: lake_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags:
                    type: array
                    items: { type: string }

  /lakes/{lake_id}/nodes/by_tag:
    get:
      tags: [tag]
      summary: 按标签过滤节点（服务端查询）
      parameters:
        - in: path
          name: lake_id
          required: true
          schema: { type: string }
        - in: query
          name: tag
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  node_ids:
                    type: array
                    items: { type: string }

  /nodes/{node_id}/tags:
    get:
      tags: [tag]
      summary: 获取节点标签列表
      parameters:
        - in: path
          name: node_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags:
                    type: array
                    items: { type: string }
    put:
      tags: [tag]
      summary: 设置节点标签（全量替换，最多 20 个）
      parameters:
        - in: path
          name: node_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tags]
              properties:
                tags:
                  type: array
                  items: { type: string }
                  maxItems: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags:
                    type: array
                    items: { type: string }

  # ==== P14-B 全文搜索 ====

  /lakes/{lake_id}/nodes/search:
    get:
      tags: [search]
      summary: 湖内全文搜索（Neo4j Lucene）
      parameters:
        - in: path
          name: lake_id
          required: true
          schema: { type: string }
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        node_id: { type: string }
                        lake_id: { type: string }
                        snippet: { type: string }
                        score: { type: number }

  # ==== P14-C 批量操作 ====

  /lakes/{lake_id}/nodes/batch_op:
    post:
      tags: [node]
      summary: 批量操作节点（最多 200 个）
      description: |
        支持 `action`：
        - `evaporate`：将 DROP/FROZEN 节点蒸发为 VAPOR
        - `condense`：将 MIST 节点凝露到湖
        - `erase`：手动彻底删除（MIST/DROP/FROZEN/VAPOR → ERASED，**不可恢复**）

        权限：
        - `evaporate` / `condense`：节点对应 owner 或湖 OWNER
        - `erase`：节点 owner 或湖 NAVIGATOR+
      parameters:
        - in: path
          name: lake_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, node_ids]
              properties:
                action:
                  type: string
                  enum: [evaporate, condense, erase]
                node_ids:
                  type: array
                  items: { type: string }
                  minItems: 1
                  maxItems: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded: { type: integer }
                  failed: { type: integer }
        '400':
          description: 参数错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ==== P13-D 内容导出 ====

  /lakes/{lake_id}/export:
    get:
      tags: [export]
      summary: 导出湖内全部节点
      parameters:
        - in: path
          name: lake_id
          required: true
          schema: { type: string }
        - in: query
          name: format
          required: true
          schema:
            type: string
            enum: [json, markdown]
      responses:
        '200':
          description: 导出文件
          content:
            application/json:
              schema:
                type: object
                description: 当 format=json 时返回
                properties:
                  nodes:
                    type: array
                    items:
                      type: object
                      properties:
                        content: { type: string }
                        type: { type: string }
            text/markdown:
              schema:
                type: string
                description: 当 format=markdown 时返回

  # ==== P13-E 内容导入 ====

  /lakes/{lake_id}/import:
    post:
      tags: [import]
      summary: 从文件导入节点到湖
      description: |
        支持格式：
        - `.json`：导出内容格式（`{nodes: [{content, type}]}`）最多 10000 节点
        - `.md` / `.markdown`：按 `## ` / `# ` 标题分割为多个节点最多 10000 节点

        权限：湖 NAVIGATOR+
      parameters:
        - in: path
          name: lake_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: JSON 或 Markdown 文件，最大 10 MB
      responses:
        '200':
          description: 导入成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported: { type: integer }
                  skipped: { type: integer }
        '400':
          description: 格式错误或节点超限
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ==== P13-B / P14-A 通知系统 ====

  /notifications:
    get:
      tags: [notification]
      summary: 列出我的通知（分页）
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - in: query
          name: before
          description: Cursor：返回 id 小于此值的通知（实现分页加载更多）
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items: { $ref: '#/components/schemas/Notification' }

  /notifications/unread_count:
    get:
      tags: [notification]
      summary: 获取未读通知数
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  /notifications/{notification_id}/read:
    post:
      tags: [notification]
      summary: 标记单条通知为已读
      parameters:
        - in: path
          name: notification_id
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: 已标记

  /notifications/read_all:
    post:
      tags: [notification]
      summary: 一键全部已读
      responses:
        '204':
          description: 已全部标记

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          description: 人类可读错误信息（中文）
        code:
          type: string
          description: 机器可读错误码

    RegisterRequest:
      type: object
      required: [email, password, display_name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 128 }
        display_name: { type: string, minLength: 1, maxLength: 64 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    TokenResponse:
      type: object
      required: [access_token, token_type, user_id, email]
      properties:
        access_token: { type: string }
        token_type: { type: string, enum: [bearer] }
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }

    LakeCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        description: { type: string, nullable: true }
        is_public: { type: boolean, default: false }

    Lake:
      type: object
      required: [id, name, owner_id, role, is_public]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        is_public: { type: boolean }
        owner_id: { type: string, format: uuid }
        role:
          type: string
          enum: [OWNER, NAVIGATOR, PASSENGER, OBSERVER]

    NodeState:
      type: string
      enum: [MIST, DROP, FROZEN, VAPOR, ERASED, GHOST]

    NodeCreate:
      type: object
      required: [lake_id, content]
      properties:
        lake_id: { type: string }
        content: { type: string, minLength: 1, maxLength: 10000 }
        type: { type: string, default: TEXT }
        position:
          type: object
          nullable: true
          properties:
            x: { type: number }
            y: { type: number }
            z: { type: number }

    Node:
      type: object
      required: [id, content, type, state]
      properties:
        id: { type: string }
        lake_id: { type: string, nullable: true }
        content: { type: string }
        type: { type: string }
        state: { $ref: '#/components/schemas/NodeState' }
        position:
          type: object
          nullable: true
          properties:
            x: { type: number }
            y: { type: number }
            z: { type: number }
        created_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }
        ttl_at: { type: string, format: date-time, nullable: true }

    MistCreate:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1, maxLength: 4000 }
        source:
          type: string
          enum: [mobile, desktop-widget, web]
          default: mobile

    Mist:
      type: object
      required: [id, content, state, ttl_at]
      properties:
        id: { type: string }
        content: { type: string }
        state: { type: string, enum: [MIST] }
        ttl_at: { type: string, format: date-time }

    CondenseRequest:
      type: object
      required: [mist_ids, target_lake_id]
      properties:
        mist_ids:
          type: array
          items: { type: string }
          minItems: 1
          maxItems: 200
        target_lake_id: { type: string }

    CondenseResponse:
      type: object
      required: [condensed]
      properties:
        condensed: { type: integer }

    Notification:
      type: object
      required: [id, type, payload, read, created_at]
      properties:
        id: { type: integer }
        type: { type: string, example: node.evaporated }
        payload: { type: object, additionalProperties: true }
        read: { type: boolean }
        created_at: { type: string, format: date-time }

# WebSocket 契约（OpenAPI 3.1 不原生支持 WS，用 x- 扩展）
x-websocket:
  '/ws/lakes/{lake_id}':
    description: 湖泊实时频道（P14-A：lake topic）
    auth: query ?token=JWT（M2 改握手子协议）
    messages:
      client_to_server:
        - type: subscribe
          payload: { lake_id: string }
        - type: cursor
          payload: { x: number, y: number }
      server_to_client:
        - type: node.created
          payload: { node: Node }
        - type: node.evaporated
          payload: { id: string }
        - type: node.restored
          payload: { node: Node }
        - type: node.erased
          payload: { node_id: string, lake_id: string, state: string }
        - type: edges.proposed
          payload:
            source: string
            edges:
              - { target: string, strength: number }
  '/ws':
    description: 用户个人实时频道（P14-A：user topic）
    auth: query ?token=JWT
    messages:
      server_to_client:
        - type: notification.new
          payload:
            id: integer
            type: string
            payload: object
            read: boolean
            created_at: string

# 版本策略
x-versioning:
  current: v1
  support_window: 12 months
  breaking_change_policy: 必须升级到 /api/v2 新路径，v1 保留 12 个月
