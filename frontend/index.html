<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#001e2b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <title>青萍 Ripple</title>
    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; background: #001e2b; color: #e6f2ee; font-family: -apple-system, 'PingFang SC', sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      // PWA · M4-T4
      // 只在生产构建中注册 Service Worker；开发环境主动注销旧 SW，避免缓存的生产 HTML 劫持 Vite dev server。
      if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        if (import.meta.env.PROD) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then((reg) => {
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // 新版本就绪，展示刷新提示 Toast
                    const toast = document.createElement('div');
                    toast.id = 'sw-update-toast';
                    toast.style.cssText = [
                      'position:fixed', 'bottom:24px', 'left:50%', 'transform:translateX(-50%)',
                      'z-index:99999', 'background:#0d1f3c', 'border:1px solid #2e8b90',
                      'border-radius:8px', 'padding:10px 16px', 'display:flex',
                      'align-items:center', 'gap:12px', 'color:#9ec5ee', 'font-size:13px',
                      'box-shadow:0 4px 20px rgba(0,0,0,0.6)', 'font-family:sans-serif',
                    ].join(';');
                    toast.innerHTML = '<span>🎯 新版本已就绪</span>'
                      + '<button id="sw-reload-btn" style="background:#2e8b90;color:#fff;border:none;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:12px">立即刷新</button>'
                      + '<button id="sw-dismiss-btn" style="background:transparent;color:#5a7a9e;border:none;cursor:pointer;font-size:16px;padding:0 2px">✕</button>';
                    document.body.appendChild(toast);
                    document.getElementById('sw-reload-btn').addEventListener('click', () => {
                      newWorker.postMessage({ type: 'SKIP_WAITING' });
                      window.location.reload();
                    });
                    document.getElementById('sw-dismiss-btn').addEventListener('click', () => {
                      toast.remove();
                    });
                  }
                });
              });
            }).catch((e) => console.warn('SW register failed:', e));
          });
        } else {
          navigator.serviceWorker.getRegistrations()
            .then((regs) => Promise.all(regs.map((reg) => reg.unregister())))
            .catch((e) => console.warn('SW unregister failed:', e));
        }
      }
    </script>
  </body>
</html>
