<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#001e2b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <title>青萍 Ripple</title>
    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; background: #001e2b; color: #e6f2ee; font-family: -apple-system, 'PingFang SC', sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      // PWA · M4-T4
      // 只在生产构建中注册 Service Worker；开发环境主动注销旧 SW，避免缓存的生产 HTML 劫持 Vite dev server。
      if ('serviceWorker' in navigator && location.protocol !== 'file:') {
        if (import.meta.env.PROD) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch((e) => console.warn('SW register failed:', e));
          });
        } else {
          navigator.serviceWorker.getRegistrations()
            .then((regs) => Promise.all(regs.map((reg) => reg.unregister())))
            .catch((e) => console.warn('SW unregister failed:', e));
        }
      }
    </script>
  </body>
</html>
