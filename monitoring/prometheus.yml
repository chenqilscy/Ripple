# Prometheus 抓取配置
# 文件位置：monitoring/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ripple-backend"
    static_configs:
      - targets: ["ripple-staging-backend:8000"]
    metrics_path: /metrics

  - job_name: "ripple-yjs-bridge"
    static_configs:
      - targets: ["ripple-staging-yjs-bridge:7790"]
    metrics_path: /metrics
    # yjs-bridge 若无 /metrics 端点，注释掉此 job 即可

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
