services:
  postgres:
    image: postgres:16-alpine
    container_name: ripple-postgres
    environment:
      POSTGRES_USER: ${PG_USER:-ripple}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      POSTGRES_DB: ripple
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-ripple} -d ripple"]
      interval: 10s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5.23-community
    container_name: ripple-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ripple-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: ripple-backend
    environment:
      RIPPLE_ENV: ${APP_ENV:-prod}
      RIPPLE_PG_URL: postgres://${PG_USER:-ripple}:${PG_PASSWORD}@postgres:5432/ripple?sslmode=disable
      RIPPLE_NEO4J_URI: bolt://neo4j:7687
      RIPPLE_NEO4J_USER: neo4j
      RIPPLE_NEO4J_PASS: ${NEO4J_PASSWORD}
      RIPPLE_REDIS_ADDR: redis:6379
      RIPPLE_REDIS_PASS: ${REDIS_PASSWORD}
      RIPPLE_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      RIPPLE_CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      RIPPLE_BROKER_KIND: redis
      RIPPLE_UPLOAD_DIR: /app/data/uploads
      RIPPLE_LOG_LEVEL: ${LOG_LEVEL:-info}
      RIPPLE_METRICS_ENABLED: "true"
    volumes:
      - upload_data:/app/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    container_name: ripple-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  neo4j_data:
  redis_data:
  upload_data:
